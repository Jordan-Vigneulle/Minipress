<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minipress</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Minipress</h1>
        <h3>L'actus pour vous, pour tous</h3>
    </header>

    <!-- Actions : tout en haut, sous le header -->
    <nav id="test-bar">
        <a href="#" id="btn-articles-orderby">Articles triés</a>

        <!-- <span class="test-group">
            <input type="number" id="input-categorie" placeholder="N° catégorie" min="1">
            <a href="#" id="btn-articles-categorie">Articles par catégorie</a>
        </span> -->

        <span class="test-group">
            <select id="select-categories">
                <option value="">-- Choisir un article --</option>
            </select>
            <a href="#" id="btn-article">Voir l'article</a>
        </span>

        <span class="test-group">
            <input type="number" id="input-user" placeholder="N° user" min="1">
            <a href="#" id="btn-articles-user">Articles par user</a>
        </span>

        <a href="#" id="btn-clear">Vider</a>
    </nav>

    <!-- Résultats : tout en dessous -->
    <main>
        <nav id="la_categorie"></nav>
        <section id="les_articles_orderby"></section>
        <section id="les_articles_par_categorie"></section>
        <section id="les_articles_par_user"></section>
        <section id="un_article"></section>
    </main>

    <footer>
        <p>Projet Minipress - DWM2 - 2026</p>
        <p>GUYOT Auriane, LOUYOT Thibaut, TAHRI Maryam-Samar, VIGNEULLE Jordan, YVON Nathan</p>
    </footer>

    <!-- Templates Handlebars -->
    <script id="categorieTemplate" type="text/x-handlebars-template">
        {{#each categories}}
            <a href="#" class="categorie" data-id="{{id}}">{{titre}}</a>
        {{/each}}
    </script>

    <script id="articleOrderbyTemplate" type="text/x-handlebars-template">
        <div id="grilleArticles">
        {{#each articles}}
            <div class="card-article" data-id="{{id}}">
                <h3>{{titre}}</h3>
                <p>{{resume}}</p>
                <p>{{date}}</p>
            </div>
        {{/each}}
        </div>
    </script>

    <script id="articleByCategorieTemplate" type="text/x-handlebars-template">
        <h2>Articles — {{categorie.titre}}</h2>
        <div id="grilleArticles">
            {{#each articles}}
                <div class="card-article" data-id="{{id}}">
                    <h3>{{titre}}</h3>
                    <p>{{resume}}</p>
                </div>
            {{/each}}
        </div>
    </script>

    <script id="articleByUserTemplate" type="text/x-handlebars-template">
        <h2>Articles de {{auteur.pseudo}}</h2>
        <div id="grilleArticles">
            {{#each articles}}
                <div class="card-article" data-id="{{id}}">
                    <h3>{{titre}}</h3>
                    <p>{{resume}}</p>
                </div>
            {{/each}}
        </div>
    </script>

    <script id="articleTemplate" type="text/x-handlebars-template">
        <div class="card-article">
            <h3>{{article.titre}}</h3>
            <p>{{article.date}}</p>
            <p>{{article.contenu}}</p>
        </div>
    </script>

    <script src="dist/bundle.js"></script>
</body>

</html>
