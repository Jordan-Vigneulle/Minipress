<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minipress</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Minipress</h1>
        <h3>L'actu pour vous, pour tous</h3>
    </header>

    <!-- Actions : tout en haut, sous le header -->
    <nav id="test-bar">
        <div class="filter-row">
            <span class="filter-label"><i class="ti ti-sort-ascending-2" aria-hidden="true"></i> Tri</span>
            <a href="#" id="btn-date-asc" class="filter-btn active">
                <i class="ti ti-calendar-up" aria-hidden="true"></i>
                Date croissante
            </a>
            <a href="#" id="btn-date-desc" class="filter-btn">
                <i class="ti ti-calendar-down" aria-hidden="true"></i>
                Date décroissante
            </a>
        </div>

        <div class="filter-sep"></div>

        <div class="filter-row">
            <span class="filter-label"><i class="ti ti-layout-grid" aria-hidden="true"></i> Catégories</span>
            <nav id="la_categorie"></nav>
        </div>

        <div class="filter-sep"></div>

        <div class="filter-row">
            <span class="filter-label"><i class="ti ti-tag" aria-hidden="true"></i> Article</span>
            <div class="filter-group">
                <select id="select-categories" aria-label="Choisir un article">
                    <option value="">— Choisir un article —</option>
                </select>
                <a href="#" id="btn-article" class="filter-btn primary">Voir</a>
            </div>
        </div>

        <div class="filter-sep"></div>

        <div class="filter-row">
            <span class="filter-label"><i class="ti ti-user" aria-hidden="true"></i> Auteur</span>
            <div class="filter-group">
                <select id="select-users" aria-label="Choisir un auteur">
                    <option value="">— Choisir un auteur —</option>
                </select>
                <a href="#" id="btn-articles-user" class="filter-btn primary">Voir</a>
            </div>
        </div>

        <div class="filter-sep"></div>

        <div class="filter-row">
            <span class="filter-label"><i class="ti ti-search" aria-hidden="true"></i> Recherche</span>
            <div class="filter-group">
                <input type="text" id="input-keyword-resume" placeholder="Mot-clé dans le résumé"
                    aria-label="Mot-clé résumé">
                <a href="#" id="btn-articles-include-resume" class="filter-btn primary">Chercher</a>
            </div>
        </div>

        <div class="filter-sep"></div>

        <div class="filter-row filter-row--end">
            <a href="#" id="btn-clear" class="filter-btn danger">
                <i class="ti ti-trash" aria-hidden="true"></i>
                Vider les filtres
            </a>
        </div>
    </nav>
    <!-- ... nav#test-bar ... -->

    <main>
        <button id="btn-retour" style="display:none;">Retour</button>
        <section id="les_articles_orderby"></section>
        <section id="les_articles_par_categorie"></section>
        <section id="les_articles_par_user"></section>
        <section id="un_article"></section>
    </main>

    <footer>
        <p>Projet Minipress - DWM2 - 2026</p>
        <p>GUYOT Auriane, LOUYOT Thibaut, TAHRI Maryam-Samar, VIGNEULLE Jordan, YVON Nathan</p>
    </footer>

    <!-- Templates Handlebars -->
    <script id="categorieTemplate" type="text/x-handlebars-template">
        {{#each categories}}
            <a href="#" class="categorie" data-id="{{id}}">{{titre}}</a>
        {{/each}}
    </script>

    <script id="articleOrderbyTemplate" type="text/x-handlebars-template">
        <div id="grilleArticles">
        {{#each articles}}
            <div class="card-article" data-id="{{id}}">
                <h3>{{titre}}</h3>
                <p>{{{resume}}}</p>
                <p>{{date}} - {{utilisateur.pseudo}}</p>
            </div>
        {{/each}}
        </div>
    </script>

    <script id="articleByCategorieTemplate" type="text/x-handlebars-template">
        <h2>Articles — {{categorie.titre}}</h2>
        <div id="grilleArticles">
            {{#each articles}}
                <div class="card-article" data-id="{{id}}">
                    <h3>{{titre}}</h3>
                    <p>{{{resume}}}</p>
                    <p>{{date}} - {{utilisateur.pseudo}}</p>
                </div>
            {{/each}}
        </div>
    </script>

    <script id="articleByUserTemplate" type="text/x-handlebars-template">
        <h2>Articles de {{auteur.pseudo}}</h2>
        <div id="grilleArticles">
            {{#each articles}}
                <div class="card-article" data-id="{{id}}">
                    <h3>{{titre}}</h3>
                    <p>{{{resume}}}</p>
                    <p>{{date}}</p>
                </div>
            {{/each}}
        </div>
    </script>

    <script id="articleTemplate" type="text/x-handlebars-template">
        <div class="article">
            <h1>{{article.titre}}</h1>
            <em>Écrit le {{article.date}} par {{article.utilisateur.pseudo}}</em>
            {{#each article.images}}
                <img src="{{ url }}" alt="">
            {{/each}}
            <p>{{{ article.contenu }}}</p>
        </div>
    </script>

    <script src="dist/bundle.js"></script>
</body>

</html>
